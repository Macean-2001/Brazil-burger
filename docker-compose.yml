services:
  web:
    image: yacine1108/brasilburger:latest
    environment:
      ConnectionStrings__DefaultConnection: "${DEFAULT_CONNECTION}"
      ASPNETCORE_URLS: "http://+:8080"
      PORT: "8080"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "8083:8080"
    restart: unless-stopped
