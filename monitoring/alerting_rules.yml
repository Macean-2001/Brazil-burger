groups:
  - name: brasilburger-alerts
    rules:
      - alert: BrasilBurgerApplicationDown
        expr: up{job="brasilburger-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "BrasilBurger application is down"
          description: "Prometheus cannot scrape the BrasilBurger /metrics endpoint."

      - alert: HighHttpErrorRate
        expr: sum(rate(http_requests_received_total{code=~"5.."}[5m])) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "The application is returning HTTP 5xx responses."
