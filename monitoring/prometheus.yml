global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alerting_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ubuntu_server'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'brasilburger-app'
    static_configs:
      - targets: ['web:8080']
    metrics_path: '/metrics'
